<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cart Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .cart-container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding: 12px 0;
        }

        .item-info {
            flex: 2;
        }

        .item-price,
        .item-total {
            flex: 1;
            text-align: center;
        }

        .item-qty {
            flex: 1;
            text-align: center;
        }

        .qty-box {
            display: inline-flex;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
        }

        .qty-box button {
            background: #eee;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .qty-box span {
            padding: 5px 12px;
            min-width: 20px;
            text-align: center;
            display: inline-block;
        }

        .total-section {
            margin-top: 20px;
            text-align: right;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="cart-container">
        <h2>Shopping Cart</h2>

        <div class="items">



        </div>

        <div class="total-section">
            Total: $<span class="total-amount">200</span>
        </div>
    </div>


    <script src="./cart.js"></script>
</body>

</html>
